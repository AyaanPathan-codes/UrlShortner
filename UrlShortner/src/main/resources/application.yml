spring:
  application:
    name: UrlShortner
  data:
    redis:
      host: ${DB_HOST:localhost}
      port:  ${REDIS_PORT:6379}
  cache:
    type : redis
    cache-names : "urlCache"
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:UrlShortner}
    username:  ${DB_USERNAME:postgres}
    password:  ${DB_USERNAME:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update      # create | create-drop | update | validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}

jwt:
  secret: MDEyMzQ1Njc4OUFCQ0RFRjAxMjM0NTY3ODlBQkNERUYwMTIzNDU2Nzg5QUJDREVG
  expiration: ${JWT_EXPIRATION:86400000}  # 24 Hours (milliseconds)

logging:
  level:
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG