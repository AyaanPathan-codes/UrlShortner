spring:
  application:
    name: UrlShortner

  datasource:
    url: jdbc:postgresql://localhost:5432/UrlShortner
    username: postgres
    password: s@yaanPathan10
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update      # create | create-drop | update | validate
    show-sql: true
